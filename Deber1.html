<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deberes - Apolo</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #333;
    }

    h1 {
        text-align: center;
        color: white;
        margin: 30px 0;
    }

    /* GRID */
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 20px;
    }

    /* CARD */
    .card {
        background: #e5e7eb;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 8px 8px 15px #0a0f1c,
                    -8px -8px 15px #1c2745;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    /* HOVER */
    .card:hover {
        transform: translateY(-10px);
        box-shadow: 12px 12px 20px #0a0f1c,
                    -12px -12px 20px #1c2745;
    }

    /* ICON */
    .icon {
        font-size: 40px;
        margin-bottom: 10px;
    }

    /* TITLE */
    .card h2 {
        margin: 10px 0;
        font-size: 24px;
        color: #111827;
    }

    /* TEXT */
    .card p {
        font-size: 14px;
        color: #4b5563;
        margin-bottom: 20px;
    }

    /* BUTTONS */
    .buttons {
        display: flex;
        gap: 10px;
    }

    .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    /* PRIMARY BUTTON */
    .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: white;
        box-shadow: 0 0 10px rgba(99,102,241,0.6);
    }

    .btn-primary:hover {
        box-shadow: 0 0 20px rgba(99,102,241,1);
        transform: scale(1.05);
    }

    /* SECOND BUTTON */
    .btn-secondary {
        background: #d1d5db;
    }

    .btn-secondary:hover {
        background: #9ca3af;
        transform: scale(1.05);
    }

</style>
</head>

<body>

<h1>📚 Mis Deberes</h1>

<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <div class="icon">📘</div>
        <h2>Deber 1</h2>
        <p>Introducción a HTML y estructura básica de páginas web.</p>
        <div class="buttons">
            <button class="btn btn-primary">Ver</button>
            <button class="btn btn-secondary">Vista</button>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <div class="icon">💻</div>
        <h2>Deber 2</h2>
        <p>Diseño con CSS y creación de estilos modernos.</p>
        <div class="buttons">
            <button class="btn btn-primary">Ver</button>
            <button class="btn btn-secondary">Vista</button>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="card">
        <div class="icon">⚙️</div>
        <h2>Deber 3</h2>
        <p>Interactividad con JavaScript y eventos.</p>
        <div class="buttons">
            <button class="btn btn-primary">Ver</button>
            <button class="btn btn-secondary">Vista</button>
        </div>
    </div>

</div>

</body>
</html>
